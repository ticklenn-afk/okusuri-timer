<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <!-- メイン背景グラデ（ピンク→パープル→水色） -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#FFB3D4"/>
      <stop offset="48%"  stop-color="#D8A8FF"/>
      <stop offset="100%" stop-color="#A8D8FF"/>
    </linearGradient>
    <!-- カプセル左半分 -->
    <linearGradient id="pillL" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#FF8EC4"/>
      <stop offset="100%" stop-color="#FF6AAB"/>
    </linearGradient>
    <!-- カプセル右半分 -->
    <linearGradient id="pillR" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#F0E8FF"/>
    </linearGradient>
    <!-- 光沢 -->
    <linearGradient id="shine" x1="20%" y1="0%" x2="80%" y2="100%">
      <stop offset="0%"   stop-color="#FFFFFF" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0"/>
    </linearGradient>
    <!-- カプセルのドロップシャドウ -->
    <filter id="pillShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="14" flood-color="rgba(180,80,200,0.35)"/>
    </filter>
    <!-- 星のドロップシャドウ -->
    <filter id="starGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="0" stdDeviation="6" flood-color="rgba(255,220,100,0.8)"/>
    </filter>
    <!-- ハートのグロー -->
    <filter id="heartGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="0" stdDeviation="5" flood-color="rgba(255,100,180,0.8)"/>
    </filter>
  </defs>

  <!-- ────── 背景（角丸正方形） ────── -->
  <rect width="512" height="512" rx="115" fill="url(#bgGrad)"/>

  <!-- 背景の内側グロー（柔らかい光） -->
  <ellipse cx="180" cy="140" rx="160" ry="120"
    fill="rgba(255,255,255,0.18)"/>
  <ellipse cx="340" cy="390" rx="130" ry="100"
    fill="rgba(200,160,255,0.15)"/>

  <!-- ────── カプセル本体 ────── -->
  <g filter="url(#pillShadow)" transform="rotate(-35, 256, 256)">
    <!-- カプセル全体の外形（角丸長方形） -->
    <rect x="138" y="196" width="236" height="120" rx="60" fill="#FFFFFF"/>

    <!-- 左半分（ピンク） -->
    <path d="M138,256 a60,60 0 0,1 60,-60 h58 v120 h-58 a60,60 0 0,1 -60,-60 z"
      fill="url(#pillL)"/>

    <!-- 右半分（白） -->
    <path d="M374,256 a60,60 0 0,1 -60,60 h-58 v-120 h58 a60,60 0 0,1 60,60 z"
      fill="url(#pillR)"/>

    <!-- 中央の仕切り線 -->
    <rect x="254" y="196" width="4" height="120" fill="rgba(220,180,255,0.5)"/>

    <!-- 光沢ハイライト -->
    <ellipse cx="220" cy="228" rx="38" ry="16"
      fill="rgba(255,255,255,0.55)" transform="rotate(-5,220,228)"/>
    <ellipse cx="330" cy="228" rx="30" ry="12"
      fill="rgba(255,255,255,0.35)" transform="rotate(-5,330,228)"/>
  </g>

  <!-- ────── 装飾：星 ✦ ────── -->
  <!-- 左上の大きい星 -->
  <g filter="url(#starGlow)">
    <text x="88" y="148" font-size="56" fill="#FFE566" text-anchor="middle"
      font-family="serif">✦</text>
  </g>
  <!-- 右上の小さい星 -->
  <g filter="url(#starGlow)">
    <text x="408" y="118" font-size="36" fill="#FFE566" text-anchor="middle"
      font-family="serif">✦</text>
  </g>
  <!-- 右下の中くらい星 -->
  <g filter="url(#starGlow)">
    <text x="420" y="420" font-size="44" fill="#FFE566" text-anchor="middle"
      font-family="serif">✦</text>
  </g>

  <!-- ────── 装飾：ハート ────── -->
  <g filter="url(#heartGlow)">
    <text x="108" y="408" font-size="40" fill="#FF7BB0" text-anchor="middle"
      font-family="serif">♥</text>
  </g>
  <g filter="url(#heartGlow)">
    <text x="392" y="300" font-size="26" fill="#FFB3D4" text-anchor="middle"
      font-family="serif">♥</text>
  </g>

  <!-- ────── 装飾：ドット ────── -->
  <circle cx="142" cy="302" r="7" fill="rgba(255,255,255,0.5)"/>
  <circle cx="370" cy="148" r="5" fill="rgba(255,255,255,0.5)"/>
  <circle cx="390" cy="370" r="9" fill="rgba(255,255,255,0.35)"/>
  <circle cx="122" cy="200" r="5" fill="rgba(255,220,240,0.6)"/>

  <!-- ────── 前面の光沢レイヤー ────── -->
  <rect width="512" height="512" rx="115" fill="url(#shine)"/>
</svg>
